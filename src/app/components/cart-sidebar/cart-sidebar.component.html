<div class="cart-sidebar" [class.open]="isOpen">
  <div class="cart-header">
    <h3>Your Cart ({{ cartCount }} items)</h3>
    <button class="close-btn" (click)="closeSidebar()">×</button>
  </div>

  <div class="cart-items" *ngIf="cartItems.length > 0; else emptyCart">
    <div class="cart-item" *ngFor="let item of cartItems">
      <img [src]="item.product.image" [alt]="item.product.name">
      <div class="item-details">
        <h4>{{ item.product.name }}</h4>
        <p class="item-price">${{ item.product.price.toFixed(2) }}</p>
        <div class="item-quantity">
          <button (click)="updateQuantity(item.product.id, item.quantity - 1)">-</button>
          <span>{{ item.quantity }}</span>
          <button (click)="updateQuantity(item.product.id, item.quantity + 1)">+</button>
        </div>
      </div>
      <button class="remove-item" (click)="removeItem(item.product.id)">×</button>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="empty-cart">
      <p>Your cart is empty</p>
    </div>
  </ng-template>

  <div class="cart-footer" *ngIf="cartItems.length > 0">
    <div class="cart-total">
      <span>Total:</span>
      <span>${{ cartTotal.toFixed(2) }}</span>
    </div>
    <button class="checkout-btn" routerLink="/checkout" (click)="closeSidebar()">Checkout</button>
    <button class="clear-cart-btn" (click)="clearCart()">Clear Cart</button>
  </div>
</div>
